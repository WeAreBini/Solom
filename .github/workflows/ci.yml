name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      solom: ${{ steps.filter.outputs.solom }}
      command-bridge: ${{ steps.filter.outputs.command-bridge }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            solom:
              - 'solom/**'
            command-bridge:
              - 'command-bridge/**'

  solom-ci:
    name: Solom CI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.solom == 'true'
    defaults:
      run:
        working-directory: solom
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Lint
        run: bun run lint --if-present

      - name: Type Check
        run: bun run type-check --if-present

      - name: Build
        run: bun run build

  command-bridge-ci:
    name: Command Bridge CI
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.command-bridge == 'true'
    defaults:
      run:
        working-directory: command-bridge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
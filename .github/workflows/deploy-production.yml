name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  detect-service:
    name: Detect Service to Deploy
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.detect.outputs.service }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if git diff --name-only HEAD~1 | grep -q "^solom/"; then
            echo "service=solom" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD~1 | grep -q "^command-bridge/"; then
            echo "service=command-bridge" >> $GITHUB_OUTPUT
          else
            echo "service=none" >> $GITHUB_OUTPUT
          fi

  deploy-solom:
    name: Deploy Solom
    runs-on: ubuntu-latest
    needs: detect-service
    if: needs.detect-service.outputs.service == 'solom'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Solom to Railway
        working-directory: solom
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_SOLOM_TOKEN }}

  deploy-command-bridge:
    name: Deploy Command Bridge
    runs-on: ubuntu-latest
    needs: detect-service
    if: needs.detect-service.outputs.service == 'command-bridge'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Command Bridge to Railway
        working-directory: command-bridge
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_COMMAND_BRIDGE_TOKEN }}

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [detect-service, deploy-solom, deploy-command-bridge]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Solom | ${{ needs.deploy-solom.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Command Bridge | ${{ needs.deploy-command-bridge.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
name: Deploy Production with Build Detection

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  detect-service:
    name: Detect Service to Deploy
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.detect.outputs.service }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          if git diff --name-only HEAD~1 | grep -q "^solom/"; then
            echo "service=solom" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD~1 | grep -q "^command-bridge/"; then
            echo "service=command-bridge" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD~1 | grep -q "^solom-data-service/"; then
            echo "service=solom-data-service" >> $GITHUB_OUTPUT
          else
            echo "service=none" >> $GITHUB_OUTPUT
          fi

  deploy-solom:
    name: Deploy Solom with Build Check
    runs-on: ubuntu-latest
    needs: detect-service
    if: needs.detect-service.outputs.service == 'solom'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: deploy
        working-directory: solom
        run: |
          railway up --detach 2>&1 | tee deploy.log
          # Extract deployment URL or ID if available
          echo "deploy_log=$(cat deploy.log)" >> $GITHUB_OUTPUT

      - name: Wait for Build Status
        id: status
        run: |
          echo "Waiting 30 seconds for build to start..."
          sleep 30
          
          # Check Railway status via REST API
          STATUS=$(curl -s "https://railway.app/api/v1/projects" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_SOLOM_TOKEN }}" 2>/dev/null || echo "unknown")
          
          echo "build_status=$STATUS" >> $GITHUB_OUTPUT
          
          # Try to get build logs
          railway status 2>&1 || true
          
      - name: Verify Deployment Health
        run: |
          # Wait for deployment to be healthy
          MAX_WAIT=300
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Check if the service is responding
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://solom.life" || echo "000")
            
            if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "304" ]; then
              echo "✅ Deployment healthy - site responding with $RESPONSE"
              exit 0
            fi
            
            echo "Waiting for deployment... ($ELAPSED/$MAX_WAIT seconds)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          
          echo "⚠️ Deployment may not be healthy after $MAX_WAIT seconds"
          echo "Previous version may still be active"
          exit 1

      - name: Notify on Failure
        if: failure()
        run: |
          echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** Solom" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Build or deployment failed" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Previous version is still active" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check Railway dashboard for details:" >> $GITHUB_STEP_SUMMARY
          echo "https://railway.app/project/solom" >> $GITHUB_STEP_SUMMARY
          
      - name: Notify on Success
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** Solom" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://solom.life" >> $GITHUB_STEP_SUMMARY

  deploy-command-bridge:
    name: Deploy Command Bridge with Build Check
    runs-on: ubuntu-latest
    needs: detect-service
    if: needs.detect-service.outputs.service == 'command-bridge'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: deploy
        working-directory: command-bridge
        run: railway up --detach

      - name: Verify Deployment Health
        run: |
          MAX_WAIT=300
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://command-bridge.up.railway.app/health" || echo "000")
            
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Deployment healthy"
              exit 0
            fi
            
            echo "Waiting... ($ELAPSED/$MAX_WAIT)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          
          echo "⚠️ Deployment may not be healthy"
          exit 1

      - name: Notify on Failure
        if: failure()
        run: |
          echo "## ❌ Deployment Failed - Command Bridge" >> $GITHUB_STEP_SUMMARY
          echo "Previous version is still active"

      - name: Notify on Success
        if: success()
        run: |
          echo "## ✅ Command Bridge Deployed" >> $GITHUB_STEP_SUMMARY

  deploy-data-service:
    name: Deploy Data Service with Build Check
    runs-on: ubuntu-latest
    needs: detect-service
    if: needs.detect-service.outputs.service == 'solom-data-service'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: solom-data-service
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_DATA_SERVICE_TOKEN }}

      - name: Verify Health
        run: |
          MAX_WAIT=120
          ELAPSED=0
          
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SOLOM_DATA_SERVICE_URL }}/health" || echo "000")
            
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Data service healthy"
              exit 0
            fi
            
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          
          echo "⚠️ Health check timed out"
          exit 1

      - name: Notify Status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "## ✅ Data Service Deployed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Data Service Failed" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [detect-service, deploy-solom, deploy-command-bridge, deploy-data-service]
    if: always()
    steps:
      - name: Post Status to Paperclip
        if: env.PAPERCLIP_WEBHOOK != ''
        env:
          PAPERCLIP_WEBHOOK: ${{ secrets.PAPERCLIP_WEBHOOK }}
        run: |
          curl -X POST "${{ secrets.PAPERCLIP_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "event": "deployment",
              "service": "${{ needs.detect-service.outputs.service }}",
              "status": "${{ needs.deploy-solom.result || needs.deploy-command-bridge.result || needs.deploy-data-service.result || 'unknown' }}",
              "commit": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
            }'

      - name: Final Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Solom | ${{ needs.deploy-solom.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Command Bridge | ${{ needs.deploy-command-bridge.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Service | ${{ needs.deploy-data-service.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'styles/**'
              - 'package.json'
              - 'tailwind.config.*'
            backend:
              - 'backend/**'
              - 'package.json'

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint --if-present

      - name: Build frontend
        run: npm run build

  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint --if-present

      - name: Check backend types
        run: npm run type-check --if-present

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Security Audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for secrets
        run: |
          if grep -r "api_key\|password\|secret\|token" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" app/ backend/ lib/ 2>/dev/null | grep -v "process.env" | grep -v "// " | grep -v "/\*"; then
            echo "⚠️ Potential hardcoded secrets found!"
            exit 1
          fi